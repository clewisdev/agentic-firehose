name = "agents-kb-capture"
main = "src/index.ts"
compatibility_date = "2026-05-29"
account_id = "29c6995e7586ac3f55f4c39def9a4307"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[vars]
GITHUB_OWNER = "clewisdev"
GITHUB_REPO = "agentic-firehose"
GITHUB_DEFAULT_BRANCH = "main"

# Secrets — set these once via wrangler CLI, never commit them:
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put GITHUB_TOKEN
#   wrangler secret put ALLOWED_SENDERS   (comma-separated email allowlist)
#
# GITHUB_TOKEN needs: Contents (read + write) on clewisdev/agentic-firehose
# Minimum scopes — use a fine-grained PAT, not a classic token.
